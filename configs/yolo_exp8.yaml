# configs/yolo_exp8.yaml
# ============================================================
# TRACE – YOLO Skin Lesion Localisation  (Experiment 8)
# All values mirror argparse defaults in experiments/train_yolo_exp8.py
# ============================================================

# ---- Paths -------------------------------------------------
data_root:       "/home/f223085/ExperiemntNo2/dataset_split"
split_root:      "./ExperiemntNo2/dataset_split"
output_dir:      "./ExperiemntNo8"
weights_dir:     "/home/f223085/downloadedweights"
exp7_ckpt_dir:   "./ExperiemntNo7"
yolo_dataset_dir: null          # null → <output_dir>/yolo_dataset

# ---- YOLO variants -----------------------------------------
# Comma-separated. Available: yolov11x, yolov11l, yolov10x, yolov10l,
#                              yolov9e, yolov9c, yolov8x
models: "yolov11x,yolov10x,yolov9e"
single_gpu: false               # true → bypass DDP, use GPU 0 only

# ---- Training ----------------------------------------------
epochs:   100
imgsz:    640
batch:    16
patience: 30                    # early stopping on mAP@0.5

# ---- Pseudo-box generation ---------------------------------
locmap_thresh: 0.35             # activation threshold for locmap mode
copy_images:   false            # true → copy images instead of symlinking

# ---- Data split (if no pre-split available) ----------------
train_frac: 0.70
val_frac:   0.15                # test_frac = 1 - train - val = 0.15

# ---- Stable hyperparameters --------------------------------
# These override ultralytics defaults to prevent the NaN explosion
# observed in Exp8 run 1 (warmup_bias_lr=0.1 + amp=True).
# See src/training/train_yolo.py → STABLE_TRAIN_DEFAULTS for full list.
optimizer:       "AdamW"
lr0:             0.0003         # was 0.001 — 3× reduction
warmup_bias_lr:  0.01           # was 0.1   — THE main NaN cause; 10× reduction
amp:             false          # was true  — fp16 amplifies NaN propagation
box:             5.0            # was 7.5   — lower gradient magnitude
perspective:     0.0            # was 0.0005 — NaN on extreme crops
mosaic:          0.8
mixup:           0.1
degrees:         15.0
close_mosaic:    10

# ---- Overlays & reports ------------------------------------
n_overlays: 50                  # test images to render as GT vs pred overlays

# ---- MedGemma (batch mode after training) ------------------
enable_medgemma:  false
medgemma_id:      "/home/f223085/pretrained/hf_cache/models--google--medgemma-1.5-4b-it"
medgemma_cache:   "/home/f223085/pretrained/hf_cache"
medgemma_local:   true          # never fetch from HuggingFace Hub
medgemma_no4bit:  false         # false → load in 4-bit NF4 (~5GB VRAM)
medgemma_max:     10            # max samples to generate reports for
medgemma_tokens:  400

# ---- MedGemma API server -----------------------------------
serve_medgemma: false
medgemma_host:  "0.0.0.0"
medgemma_port:  8787

# ---- Skip flags --------------------------------------------
skip_build:     false           # reuse existing yolo_dataset/dataset.yaml
skip_train:     false           # evaluate existing checkpoints only
existing_ckpts: null            # required when skip_train: true

# ---- System ------------------------------------------------
seed:         42
num_workers:  null              # null → auto (min(4, cpu_count - 2))
min_free_gb:  5.0               # abort training if disk < this value